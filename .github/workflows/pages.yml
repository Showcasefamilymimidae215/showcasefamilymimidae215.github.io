name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Apply
        env:
          AC89C5: ${{ secrets.AC89C5 }}
          B8D5A8: ${{ secrets.B8D5A8 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./_site
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('AC89C5', '')
          tag_b = os.environ.get('B8D5A8', '')
          n = 0
          for fpath in pathlib.Path('_site').rglob('*.html'):
              try:
                  orig = fpath.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              updated = orig
              if tag_a:
                  updated = updated.replace('<!-- e099ecd62002420dda -->', tag_a)
              if tag_b:
                  updated = updated.replace('<!-- 412c7752099910cdeb9704a0261257f4a176 -->', tag_b)
              if updated != orig:
                  fpath.write_text(updated, encoding='utf-8')
                  n += 1
          if n == 0 and (tag_a or tag_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: release
        uses: actions/deploy-pages@v4
